<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Feras Alkhodari</title>
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- LOGIN VIEW -->
  <div id="login-view" class="login-wrap">
    <form id="login-form" class="login-card" autocomplete="off">
      <div class="lock"><i class="fas fa-lock"></i></div>
      <h1>Admin Access</h1>
      <p class="sub">Enter your password to manage your portfolio content.</p>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn primary block" id="login-btn">
        <i class="fas fa-right-to-bracket"></i> Log in
      </button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>

  <!-- EDITOR VIEW -->
  <div id="editor-view" class="hidden">
    <div class="topbar">
      <span class="brand"><span class="dot"></span> Portfolio Admin</span>
      <span class="spacer"></span>
      <span class="status" id="status">Loaded</span>
      <a class="btn ghost small" href="index.html" target="_blank"><i class="fas fa-eye"></i> View site</a>
      <button class="btn ghost small" id="export-btn"><i class="fas fa-download"></i> Backup</button>
      <button class="btn ghost small" id="import-btn"><i class="fas fa-upload"></i> Import</button>
      <button class="btn ghost small" id="logout-btn"><i class="fas fa-right-from-bracket"></i> Logout</button>
      <button class="btn primary small" id="save-btn"><i class="fas fa-floppy-disk"></i> Save &amp; Publish</button>
    </div>

    <div class="wrap">
      <div id="warnings"></div>
      <div id="panels"></div>

      <div class="toolbar" style="margin-top:1.5rem;">
        <button class="btn primary" id="save-btn-2"><i class="fas fa-floppy-disk"></i> Save &amp; Publish</button>
      </div>
      <p class="hint" style="margin-top:0.75rem;">
        Changes go live on your site within ~30 seconds of saving. Images you upload are stored
        automatically. Use <strong>Backup</strong> to download a copy of all your content.
      </p>
    </div>
  </div>

  <input type="file" id="import-file" accept="application/json" class="hidden" />
  <div class="toast" id="toast"></div>

  <script src="js/translations.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
